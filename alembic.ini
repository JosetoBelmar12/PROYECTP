[alembic]
script_location = alembic

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s

[alembic:env]
# sqlalchemy.url will be set by env.py using app.database.DATABASE_URL

[alembic:runtime]

[alembic:sections]

[alembic:options]

[alembic:post_write_hooks]

; default DB URL; env.py will override if present
sqlalchemy.url = sqlite:///./data.db
